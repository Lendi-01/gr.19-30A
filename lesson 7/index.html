<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 7</title>
</head>

<body>
    <fieldset>
      <legend>Personal info:</legend>

    <form action="">
        <label for="firstname">First Name:</label><br>
        <input type="text" name="firstname" id="firstname" required> <br>

        <label for="lastname">Last Name:</label><br>
        <input type="text" name="lastname" id="lastname" required><br>

        <label for="email">Email:</label><br>
        <input type="text" name="email" id="email" required><br>

        <label for="password">Password:</label><br>
        <input type="text" name="password" id="password" required><br>

        <label for="age">Age:</label><br>
        <input type="number" name="age" id="age" required><br><br>

        <label for="gender">Gender:</label><br>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label><br>

        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label><br><br>
        
        <label for="hobbies">Hobbies:</label><br>
        <input type="checkbox" name="gamming" id="gamming" value="gamming">
        <label for="gamming">Gamming</label><br>

        <input type="checkbox" name="football" id="football" value="football">
        <label for="football">Football</label><br>

        <input type="checkbox" name="voleyball" id="voleyball" value="voleyball">
        <label for="voleyball">Voleyball</label><br>

        <input type="checkbox" name="basketball" id="basketball" value="basketball">
        <label for="basketball">Basketball</label><br><br><br>

        <label for="pets">Choose your pet:</label>

    <select name="pets" id="pets">
        <option value="dog">Dog</option>
        <option value="cat">Cat</option>
        <option value="bird">Bird</option>
        <option value="iriq">Iriq</option>

    </select><br><br>

    <textarea name="message" id="message" rows="10" cols="20"></textarea><br><br>

    <input type="submit" name="submit" id="submit">


    </form>
    </fieldset>
</body>

</html>
